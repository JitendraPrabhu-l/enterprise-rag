# ADR-021: static chat/upload UI + same-origin reverse proxy.
#
# The image (ui/Dockerfile) bakes in a compose-oriented nginx.conf whose
# upstreams are plain compose DNS names (http://ingestion:8000, ...). In
# Kubernetes the Services are release-prefixed, so this ConfigMap overrides
# just the nginx config with templated upstream names; the static assets
# still come from the image.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-ui-nginx
  labels:
    {{- include "production-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        client_max_body_size 200m;

        location / {
            try_files $uri /index.html;
        }

        location = /api/health/ingestion  { proxy_pass http://{{ .Release.Name }}-ingestion:{{ .Values.applicationServices.ingestion.servicePort }}/healthz; }
        location = /api/health/retrieval  { proxy_pass http://{{ .Release.Name }}-retrieval:{{ .Values.applicationServices.retrieval.servicePort }}/healthz; }
        location = /api/health/generation { proxy_pass http://{{ .Release.Name }}-generation:{{ .Values.applicationServices.generation.servicePort }}/healthz; }
        location = /api/health/eval       { proxy_pass http://{{ .Release.Name }}-eval:{{ .Values.applicationServices.eval.servicePort }}/healthz; }

        location /api/ingest {
            proxy_pass http://{{ .Release.Name }}-ingestion:{{ .Values.applicationServices.ingestion.servicePort }}/ingest;
            proxy_read_timeout 300s;
            proxy_request_buffering off;
        }

        location = /api/retrieve {
            proxy_pass http://{{ .Release.Name }}-retrieval:{{ .Values.applicationServices.retrieval.servicePort }}/retrieve;
            proxy_read_timeout 300s;
        }

        location = /api/generate {
            proxy_pass http://{{ .Release.Name }}-generation:{{ .Values.applicationServices.generation.servicePort }}/generate;
            proxy_read_timeout 300s;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ui
  labels:
    {{- include "production-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        app.kubernetes.io/component: ui
    spec:
      containers:
        - name: ui
          image: "{{ .Values.image.registry }}/ui:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.ui.port }}
          readinessProbe:
            httpGet: {path: /, port: {{ .Values.ui.port }}}
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /, port: {{ .Values.ui.port }}}
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: nginx-conf
          configMap:
            name: {{ .Release.Name }}-ui-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-ui
  labels:
    {{- include "production-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/component: ui
  ports:
    - port: {{ .Values.ui.servicePort }}
      targetPort: {{ .Values.ui.port }}
      {{- if eq .Values.service.type "NodePort" }}
      nodePort: {{ .Values.ui.nodePort }}
      {{- end }}

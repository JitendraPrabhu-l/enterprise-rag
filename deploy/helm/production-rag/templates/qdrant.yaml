apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-qdrant
  labels:
    {{- include "production-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  serviceName: {{ .Release.Name }}-qdrant
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: qdrant
  template:
    metadata:
      labels:
        app.kubernetes.io/component: qdrant
    spec:
      containers:
        - name: qdrant
          image: {{ .Values.qdrant.image }}
          ports:
            - containerPort: {{ .Values.qdrant.port }}
          readinessProbe:
            tcpSocket: {port: {{ .Values.qdrant.port }}}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket: {port: {{ .Values.qdrant.port }}}
            initialDelaySeconds: 10
            periodSeconds: 15
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
  volumeClaimTemplates:
    - metadata:
        name: qdrant-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.qdrant.storage.storageClassName }}
        storageClassName: {{ .Values.qdrant.storage.storageClassName }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.qdrant.storage.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-qdrant
  labels:
    {{- include "production-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  selector:
    app.kubernetes.io/component: qdrant
  ports:
    - port: {{ .Values.qdrant.port }}
      targetPort: {{ .Values.qdrant.port }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-retrieval
  labels:
    {{- include "production-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: retrieval
spec:
  replicas: {{ .Values.applicationServices.retrieval.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: retrieval
  template:
    metadata:
      labels:
        app.kubernetes.io/component: retrieval
    spec:
      containers:
        - name: retrieval
          image: "{{ .Values.image.registry }}/retrieval:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- include "production-rag.commonEnv" . | nindent 12 }}
            - name: SERVICE_NAME
              value: rag-retrieval
          ports:
            - containerPort: {{ .Values.applicationServices.retrieval.port }}
          readinessProbe:
            httpGet: {path: /healthz, port: {{ .Values.applicationServices.retrieval.port }}}
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet: {path: /healthz, port: {{ .Values.applicationServices.retrieval.port }}}
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.applicationServices.retrieval.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-retrieval
  labels:
    {{- include "production-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: retrieval
spec:
  {{- include "production-rag.serviceType" . | nindent 2 }}
  selector:
    app.kubernetes.io/component: retrieval
  ports:
    - port: {{ .Values.applicationServices.retrieval.servicePort }}
      targetPort: {{ .Values.applicationServices.retrieval.port }}
      {{- if eq .Values.service.type "NodePort" }}
      nodePort: {{ .Values.applicationServices.retrieval.nodePort }}
      {{- end }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-otel-collector-config
  labels:
    {{- include "production-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          http:
            endpoint: 0.0.0.0:4318
          grpc:
            endpoint: 0.0.0.0:4317

    processors:
      batch: {}

    exporters:
      debug:
        verbosity: basic
      otlp/tempo:
        endpoint: {{ .Release.Name }}-tempo:4317
        tls:
          insecure: true
      otlp/phoenix:
        endpoint: {{ .Release.Name }}-phoenix:{{ .Values.phoenix.grpcPort }}
        tls:
          insecure: true

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug, otlp/tempo, otlp/phoenix]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-otel-collector
  labels:
    {{- include "production-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/component: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: {{ .Values.otelCollector.image }}
          args: ["--config=/etc/otel-collector-config.yaml"]
          ports:
            - containerPort: {{ .Values.otelCollector.httpPort }}
            - containerPort: {{ .Values.otelCollector.grpcPort }}
          volumeMounts:
            - name: config
              mountPath: /etc/otel-collector-config.yaml
              subPath: otel-collector-config.yaml
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-otel-collector
  labels:
    {{- include "production-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
spec:
  selector:
    app.kubernetes.io/component: otel-collector
  ports:
    - name: http
      port: {{ .Values.otelCollector.httpPort }}
      targetPort: {{ .Values.otelCollector.httpPort }}
    - name: grpc
      port: {{ .Values.otelCollector.grpcPort }}
      targetPort: {{ .Values.otelCollector.grpcPort }}

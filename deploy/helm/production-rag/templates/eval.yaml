apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-eval
  labels:
    {{- include "production-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: eval
spec:
  replicas: {{ .Values.applicationServices.eval.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: eval
  template:
    metadata:
      labels:
        app.kubernetes.io/component: eval
    spec:
      containers:
        - name: eval
          image: "{{ .Values.image.registry }}/eval:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- include "production-rag.commonEnv" . | nindent 12 }}
            - name: SERVICE_NAME
              value: rag-eval
            - name: RETRIEVAL_SERVICE_URL
              value: "http://{{ .Release.Name }}-retrieval:{{ .Values.applicationServices.retrieval.servicePort }}"
            - name: GENERATION_SERVICE_URL
              value: "http://{{ .Release.Name }}-generation:{{ .Values.applicationServices.generation.servicePort }}"
          ports:
            - containerPort: {{ .Values.applicationServices.eval.port }}
          readinessProbe:
            httpGet: {path: /healthz, port: {{ .Values.applicationServices.eval.port }}}
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet: {path: /healthz, port: {{ .Values.applicationServices.eval.port }}}
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.applicationServices.eval.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-eval
  labels:
    {{- include "production-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: eval
spec:
  {{- include "production-rag.serviceType" . | nindent 2 }}
  selector:
    app.kubernetes.io/component: eval
  ports:
    - port: {{ .Values.applicationServices.eval.servicePort }}
      targetPort: {{ .Values.applicationServices.eval.port }}
      {{- if eq .Values.service.type "NodePort" }}
      nodePort: {{ .Values.applicationServices.eval.nodePort }}
      {{- end }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-tempo-config
  labels:
    {{- include "production-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: tempo
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal

    compactor:
      compaction:
        block_retention: 72h
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-tempo
  labels:
    {{- include "production-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: tempo
spec:
  serviceName: {{ .Release.Name }}-tempo
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: tempo
  template:
    metadata:
      labels:
        app.kubernetes.io/component: tempo
    spec:
      containers:
        - name: tempo
          image: {{ .Values.tempo.image }}
          args: ["-config.file=/etc/tempo.yaml"]
          volumeMounts:
            - name: config
              mountPath: /etc/tempo.yaml
              subPath: tempo.yaml
            - name: tempo-storage
              mountPath: /var/tempo
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-tempo-config
  volumeClaimTemplates:
    - metadata:
        name: tempo-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.tempo.storage.storageClassName }}
        storageClassName: {{ .Values.tempo.storage.storageClassName }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.tempo.storage.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-tempo
  labels:
    {{- include "production-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: tempo
spec:
  selector:
    app.kubernetes.io/component: tempo
  ports:
    - port: 4317
      targetPort: 4317

# ADR-021: ships every container's stdout/stderr in this compose project to
# Loki, labeled by compose service name. Discovers containers over the Docker
# socket (read-only mount in docker-compose.yml).
server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
        filters:
          # Only this stack's containers — a shared Docker daemon on a dev
          # machine runs plenty of unrelated workloads.
          - name: label
            values: ["com.docker.compose.project=production-rag"]
    relabel_configs:
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container

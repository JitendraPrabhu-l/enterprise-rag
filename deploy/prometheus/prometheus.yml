# ADR-021: metrics scraping for the RAG stack.
# Service targets use compose-internal DNS names and the container port
# (8000) — not the host-mapped ports — since Prometheus runs on the same
# Docker network.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: rag-ingestion
    static_configs:
      - targets: ["ingestion:8000"]

  - job_name: rag-retrieval
    static_configs:
      - targets: ["retrieval:8000"]

  - job_name: rag-generation
    static_configs:
      - targets: ["generation:8000"]

  - job_name: rag-eval
    static_configs:
      - targets: ["eval:8000"]

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["packages/*/build", "**/__pycache__", ".venv*", "**/.venv"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "C4", "S"]
# S101: assert is expected in test files.
# UP042: str+Enum (not enum.StrEnum) is intentional in rag_core.schemas — every
# service constructs these enums from raw strings and relies on str, Enum's exact
# serialization behavior.
ignore = ["S101", "UP042"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
exclude = ["tests/", "scripts/"]

[tool.pytest.ini_options]
testpaths = ["packages", "services", "tests"]
asyncio_mode = "auto"
addopts = "-ra -q"

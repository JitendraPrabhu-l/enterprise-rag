name: production-rag

x-service-env: &service-env
  GROQ_API_KEY: ${GROQ_API_KEY}
  GENERATION_MODEL: ${GENERATION_MODEL:-openai/gpt-oss-120b}
  VISION_MODEL: ${VISION_MODEL:-openai/gpt-oss-120b}
  UTILITY_MODEL: ${UTILITY_MODEL:-openai/gpt-oss-120b}
  QDRANT_URL: http://qdrant:6333
  OPENSEARCH_URL: http://opensearch:9200
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: ${NEO4J_USER:-neo4j}
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:-change-me-in-prod}
  REDIS_URL: redis://redis:6379/0
  RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
  MINIO_ENDPOINT_URL: http://minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin_change_me}
  MINIO_BUCKET: ${MINIO_BUCKET:-rag-documents}
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  OTEL_TRACES_SAMPLE_RATE: ${OTEL_TRACES_SAMPLE_RATE:-1.0}
  ENVIRONMENT: ${ENVIRONMENT:-development}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

services:
  # ---------- storage ----------
  qdrant:
    image: qdrant/qdrant:v1.11.3
    ports: ["6333:6333"]
    volumes: [qdrant_data:/qdrant/storage]
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  opensearch:
    image: opensearchproject/opensearch:2.17.1
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      # OpenSearch 2.12+ requires this even with the security plugin disabled,
      # or the security-demo installer refuses to start (self-signed/dev only).
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "ChangeMe_Dev123!"
    ports: ["9200:9200"]
    volumes: [opensearch_data:/usr/share/opensearch/data]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  neo4j:
    image: neo4j:5.24-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-change-me-in-prod}
      NEO4J_PLUGINS: '["apoc"]'
    ports: ["7474:7474", "7687:7687"]
    volumes: [neo4j_data:/data]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # No volume: both the embedding cache and the rate limiter (ADR-013)
    # tolerate a cold cache on restart, so persistence isn't worth the extra
    # durability surface for a dev/CI-oriented deployment.
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_change_me}
    ports: ["9000:9000", "9001:9001"]
    volumes: [minio_data:/data]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio-init:
    # One-shot: MinIO's server doesn't auto-create buckets on startup, so
    # this creates rag-documents (idempotently — `mc mb --ignore-existing`)
    # once and exits. ADR-014.
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    depends_on:
      minio: {condition: service_healthy}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin_change_me} &&
      mc mb --ignore-existing local/${MINIO_BUCKET:-rag-documents}
      "
    restart: "no"

  # ---------- observability ----------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./deploy/docker/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports: ["4318:4318", "4317:4317"]
    depends_on: [tempo, phoenix]
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./deploy/docker/tempo-config.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.2
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_INSTALL_PLUGINS: ""
    ports: ["3000:3000"]
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [tempo, prometheus, loki]
    restart: unless-stopped

  prometheus:
    # ADR-021: scrapes every service's /metrics; evaluates alert rules.
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=72h
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    ports: ["9090:9090"]
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    volumes:
      - ./deploy/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports: ["9093:9093"]
    restart: unless-stopped

  loki:
    # ADR-021: centralized log store, queried from Grafana.
    image: grafana/loki:3.1.1
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./deploy/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    ports: ["3100:3100"]
    restart: unless-stopped

  promtail:
    # ADR-021: ships container logs (this compose project only) to Loki.
    image: grafana/promtail:3.1.1
    command: ["-config.file=/etc/promtail/promtail-config.yaml"]
    volumes:
      - ./deploy/promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on: [loki]
    restart: unless-stopped

  # ---------- UI ----------
  ui:
    # ADR-021: static chat/upload UI + same-origin reverse proxy to the
    # service APIs. Stock nginx with mounted config — no image to build.
    image: nginx:1.27-alpine
    volumes:
      - ./ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ui/index.html:/usr/share/nginx/html/index.html:ro
      - ./ui/app.js:/usr/share/nginx/html/app.js:ro
      - ./ui/styles.css:/usr/share/nginx/html/styles.css:ro
    ports: ["8080:80"]
    depends_on:
      ingestion: {condition: service_healthy}
      retrieval: {condition: service_healthy}
      generation: {condition: service_healthy}
    restart: unless-stopped

  phoenix:
    # ADR-016: RAG-specific trace UI. Receives the exact same OTLP spans as
    # Tempo — otel-collector fans one export out to both, reaching this
    # container over the internal Docker network (otlp/phoenix exporter in
    # otel-collector-config.yaml) — no application code talks to Phoenix
    # directly, and the OTLP gRPC port below only needs a host mapping for
    # local debugging, not for the collector fan-out to work.
    image: arizephoenix/phoenix:17.26.0
    ports:
      - "6006:6006"   # UI + OTLP/HTTP ingest
      - "4319:4317"   # OTLP/gRPC — host 4319 since 4317/4318 are otel-collector's
    volumes:
      - phoenix_data:/mnt/data
    environment:
      PHOENIX_WORKING_DIR: /mnt/data
    restart: unless-stopped

  # ---------- application services ----------
  ingestion:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    environment:
      <<: *service-env
      SERVICE_NAME: rag-ingestion
    ports: ["8001:8000"]
    volumes:
      # ADR-015: shared with ingestion-worker so a multipart upload the API
      # container writes to disk is still there when the worker picks the
      # job up — these are two separate containers/processes now.
      - ingestion_uploads:/tmp/rag-ingestion-uploads
    depends_on:
      qdrant: {condition: service_healthy}
      opensearch: {condition: service_healthy}
      neo4j: {condition: service_healthy}
      minio-init: {condition: service_completed_successfully}
      redis: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ingestion-worker:
    # ADR-015: same image as `ingestion`, different command — runs the
    # Celery worker that actually executes IngestionPipeline.ingest(), so
    # the API container itself never blocks a request on pipeline work.
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    command: ["celery", "-A", "rag_ingestion.tasks.celery_app", "worker", "--loglevel=INFO", "--concurrency=2"]
    environment:
      <<: *service-env
      SERVICE_NAME: rag-ingestion-worker
    volumes:
      - ingestion_uploads:/tmp/rag-ingestion-uploads
    depends_on:
      qdrant: {condition: service_healthy}
      opensearch: {condition: service_healthy}
      neo4j: {condition: service_healthy}
      minio-init: {condition: service_completed_successfully}
      redis: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "celery", "-A", "rag_ingestion.tasks.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  retrieval:
    build:
      context: .
      dockerfile: services/retrieval/Dockerfile
    environment:
      <<: *service-env
      SERVICE_NAME: rag-retrieval
    ports: ["8002:8000"]
    depends_on:
      qdrant: {condition: service_healthy}
      opensearch: {condition: service_healthy}
      neo4j: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  generation:
    build:
      context: .
      dockerfile: services/generation/Dockerfile
    environment:
      <<: *service-env
      SERVICE_NAME: rag-generation
      RETRIEVAL_SERVICE_URL: http://retrieval:8000
    ports: ["8003:8000"]
    depends_on:
      retrieval: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  eval:
    build:
      context: .
      dockerfile: services/eval/Dockerfile
    environment:
      <<: *service-env
      SERVICE_NAME: rag-eval
      RETRIEVAL_SERVICE_URL: http://retrieval:8000
      GENERATION_SERVICE_URL: http://generation:8000
    ports: ["8004:8000"]
    depends_on:
      generation: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  qdrant_data:
  opensearch_data:
  neo4j_data:
  tempo_data:
  minio_data:
  ingestion_uploads:
  phoenix_data:
  prometheus_data:
  loki_data:

# ADR-021: single-origin UI. nginx serves the static app AND reverse-proxies
# the service APIs under /api/*, so the browser never makes a cross-origin
# request and no service needs CORS headers.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # PDF uploads route through here to the ingestion service.
    client_max_body_size 200m;

    location / {
        try_files $uri /index.html;
    }

    # ---- service healthchecks (for the UI's status chips) ----
    location = /api/health/ingestion  { proxy_pass http://ingestion:8000/healthz; }
    location = /api/health/retrieval  { proxy_pass http://retrieval:8000/healthz; }
    location = /api/health/generation { proxy_pass http://generation:8000/healthz; }
    location = /api/health/eval       { proxy_pass http://eval:8000/healthz; }

    # ---- ingestion: POST /api/ingest, GET /api/ingest/{job_id} ----
    location /api/ingest {
        proxy_pass http://ingestion:8000/ingest;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }

    # ---- retrieval ----
    location = /api/retrieve {
        proxy_pass http://retrieval:8000/retrieve;
        proxy_read_timeout 300s;
    }

    # ---- generation (retrieval + rerank + LLM: the slow path) ----
    location = /api/generate {
        proxy_pass http://generation:8000/generate;
        proxy_read_timeout 300s;
    }

    # ---- answer feedback (ADR-027) ----
    location = /api/feedback {
        proxy_pass http://generation:8000/feedback;
    }
}
